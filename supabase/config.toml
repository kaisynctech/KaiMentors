project_id = "kaimentors"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://kaimentors.vercel.app"
additional_redirect_urls = ["https://kaimentors.vercel.app/**", "http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 6
otp_expiry = 900

[auth.email.template.magic_link]
subject = "Your KaiMentors verification code"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.confirmation]
subject = "Confirm your KaiMentors email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.invite]
subject = "Activate your KaiMentors workspace"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Reset your KaiMentors password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your KaiMentors email change"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.reauthentication]
subject = "Your KaiMentors reauthentication code"
content_path = "./supabase/templates/reauthentication.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.verify-broker-account]
verify_jwt = true
